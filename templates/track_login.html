{% extends "base.html" %}
{% block title %}Track Login{% endblock %}
{% block content %}
<h1>Track Sign In</h1>
<form method="POST">
  <label>Username <input type="text" name="username" required></label>
  <label>Password <input type="password" name="password" required></label>
  <button type="submit">Sign In</button>
</form>
<p>No account? <a href="{{ url_for('auth.track_register') }}">Register</a></p>
{% endblock %}
